services:
  postgres:
    image: postgres:16-alpine
    container_name: stayconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stayconnect_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stayconnect_postgres_data:/var/lib/postgresql/data

volumes:
  stayconnect_postgres_data:
